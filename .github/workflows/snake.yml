name: Generate Snake Animation

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake Animation (Light Mode)
        uses: Platane/snk@v3
        with:
          github_user_name: saivenkatsumanth9-stack
          outputs: dist/github-snake.svg
          snake_color: '#ff007f'
          dot_color: '#00f2fe'
          dot_empty_color: '#161b22'

      - name: Generate Snake Animation (Dark Mode)
        uses: Platane/snk@v3
        with:
          github_user_name: saivenkatsumanth9-stack
          outputs: dist/github-snake-dark.svg?palette=github-dark&color_snake=#ff007f&color_dots=#161b22,#5f00a7,#bd00db,#ff007f,#00f2fe&color_empty=#161b22

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
