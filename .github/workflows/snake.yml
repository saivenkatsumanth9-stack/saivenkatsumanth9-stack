name: Generate Snake Animation

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake Animation (Light Mode)
        uses: Platane/snk@v3
        with:
          github_user_name: saivenkatsumanth9-stack
          outputs: dist/github-snake.svg
          snake_color: '#a855f7'
          dot_color: '#c084fc'
          dot_empty_color: '#21262d'

      - name: Generate Snake Animation (Dark Mode)
        uses: Platane/snk@v3
        with:
          github_user_name: saivenkatsumanth9-stack
          outputs: dist/github-snake-dark.svg?palette=github-dark&color_snake=#a855f7&color_dots=#c084fc,#7c3aed,#a855f7,#c084fc,#e9d5ff&color_empty=#161b22

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
