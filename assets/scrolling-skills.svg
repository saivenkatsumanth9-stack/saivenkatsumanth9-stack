<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 60" width="100%" height="60" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;display=swap');
    .text-item {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      font-weight: 700;
      fill: url(#text-grad);
      letter-spacing: 3px;
    }
  </style>
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="35%" stop-color="#c084fc"/>
      <stop offset="70%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <clipPath id="clip-container">
      <rect width="990" height="56" x="5" y="2" rx="10"/>
    </clipPath>
  </defs>
  <rect width="998" height="58" x="1" y="1" rx="12" fill="#0d1117" stroke="url(#border-grad)" stroke-width="2"/>
  
  <g clip-path="url(#clip-container)">
    <g>
      <text x="0" y="37" class="text-item">
        ⚡ PYTHON   •   ☕ JAVA   •   💻 C   •   🎮 C#   •   ⚛️ REACT   •   🌐 NEXT.JS   •   ⚙️ NODE.JS   •   🤖 TENSORFLOW   •   🛠️ UNITY   •   📊 MYSQL   •   ⚡ PYTHON   •   ☕ JAVA   •   💻 C   •   🎮 C#   •   ⚛️ REACT   •   🌐 NEXT.JS   •   ⚙️ NODE.JS   •   🤖 TENSORFLOW   •   🛠️ UNITY   •   📊 MYSQL
      </text>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        from="0 0" 
        to="-1175 0" 
        dur="25s" 
        repeatCount="indefinite" />
    </g>
  </g>
</svg>
