<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="150" fill="none">
  <style>
    @keyframes fade-response {
      0%, 50% { opacity: 0; }
      60%, 100% { opacity: 1; }
    }
    .term-bg { fill: #0d1117; stroke: url(#border-grad); stroke-width: 2; rx: 6; }
    .term-text { font-family: monospace; font-size: 11px; fill: #c9d1d9; }
    .prompt { fill: #ff007f; font-weight: bold; }
    .green { fill: #39ff14; }
    .cyan { fill: #00f2fe; }
  </style>
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>
  </defs>
  
  <rect width="298" height="148" x="1" y="1" class="term-bg"/>
  <circle cx="15" cy="15" r="4" fill="#ff5f56"/>
  <circle cx="27" cy="15" r="4" fill="#ffbd2e"/>
  <circle cx="39" cy="15" r="4" fill="#27c93f"/>
  
  <g transform="translate(15, 45)">
    <text x="0" y="0" class="term-text prompt">$ python study_buddy.py</text>
    <text x="0" y="20" class="term-text prompt">&gt; Query: <tspan class="term-text" fill="#ffee32">RAG Architecture</tspan></text>
    
    <g transform="translate(0, 45)" style="animation: fade-response 4s infinite;">
      <text x="0" y="0" class="term-text cyan">&gt;&gt;&gt; Retrieving chunks... [SUCCESS]</text>
      <text x="0" y="15" class="term-text cyan">&gt;&gt;&gt; Formatting answer... [SUCCESS]</text>
      <text x="0" y="30" class="term-text" fill="#bd93f9">💬 Answer generated by GPT-4 model.</text>
    </g>
  </g>
</svg>
