<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <style>
      @keyframes glow-pulse {
        0%, 100% {
          filter: drop-shadow(0 0 6px #D4AF37) drop-shadow(0 0 12px rgba(212,175,55,0.4));
          opacity: 0.9;
        }
        50% {
          filter: drop-shadow(0 0 14px #FFD700) drop-shadow(0 0 28px rgba(255,215,0,0.5));
          opacity: 1;
        }
      }
      .glow-border {
        animation: glow-pulse 3s ease-in-out infinite;
      }
    </style>
    <linearGradient id="border-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA771C">
        <animate attributeName="stop-color" values="#AA771C;#D4AF37;#FFD700;#D4AF37;#AA771C" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#D4AF37">
        <animate attributeName="stop-color" values="#D4AF37;#FFD700;#AA771C;#FFD700;#D4AF37" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFD700">
        <animate attributeName="stop-color" values="#FFD700;#AA771C;#D4AF37;#AA771C;#FFD700" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Animated glowing border rectangle -->
  <rect
    class="glow-border"
    x="3"
    y="3"
    width="794"
    height="394"
    rx="16"
    ry="16"
    fill="none"
    stroke="url(#border-gradient)"
    stroke-width="2.5"
  />

  <!-- Inner subtle secondary border for depth -->
  <rect
    x="8"
    y="8"
    width="784"
    height="384"
    rx="13"
    ry="13"
    fill="none"
    stroke="#D4AF37"
    stroke-width="0.5"
    opacity="0.25"
  />
</svg>
