<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 20" width="100%" height="20" fill="none">
  <style>
    /* Flowing gradient shift */
    @keyframes gradient-flow {
      0%   { transform: translateX(-500px); }
      100% { transform: translateX(500px); }
    }

    /* Center diamond pulse */
    @keyframes diamond-pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50%      { transform: scale(1.3); opacity: 1; }
    }

    /* Floating particles upward */
    @keyframes float-up-1 { 0% { transform: translateY(0); opacity: 0.35; } 50% { opacity: 0.18; } 100% { transform: translateY(-12px); opacity: 0; } }
    @keyframes float-up-2 { 0% { transform: translateY(0); opacity: 0.28; } 50% { opacity: 0.15; } 100% { transform: translateY(-10px); opacity: 0; } }
    @keyframes float-up-3 { 0% { transform: translateY(0); opacity: 0.3; } 50% { opacity: 0.12; } 100% { transform: translateY(-14px); opacity: 0; } }

    .gradient-bar {
      animation: gradient-flow 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .diamond-center {
      animation: diamond-pulse 2.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      transform-origin: 500px 10px;
    }

    .p1 { animation: float-up-1 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .p2 { animation: float-up-2 3.5s cubic-bezier(0.4, 0, 0.6, 1) infinite 0.6s; }
    .p3 { animation: float-up-3 4s cubic-bezier(0.4, 0, 0.6, 1) infinite 1.2s; }
    .p4 { animation: float-up-1 3.2s cubic-bezier(0.4, 0, 0.6, 1) infinite 0.9s; }
    .p5 { animation: float-up-2 3.8s cubic-bezier(0.4, 0, 0.6, 1) infinite 1.8s; }
    .p6 { animation: float-up-3 3.4s cubic-bezier(0.4, 0, 0.6, 1) infinite 2.4s; }
    .p7 { animation: float-up-1 4.2s cubic-bezier(0.4, 0, 0.6, 1) infinite 0.3s; }
    .p8 { animation: float-up-2 3.6s cubic-bezier(0.4, 0, 0.6, 1) infinite 1.5s; }

    @media (prefers-reduced-motion: reduce) {
      .gradient-bar, .diamond-center,
      .p1, .p2, .p3, .p4, .p5, .p6, .p7, .p8 {
        animation: none;
      }
    }
  </style>

  <defs>
    <linearGradient id="gold-flow" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b59410" stop-opacity="0"/>
      <stop offset="20%" stop-color="#b59410" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#d4af37" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#d4af37" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#b59410" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#b59410" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-base" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="15%" stop-color="#d4af37" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="85%" stop-color="#d4af37" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <filter id="diamond-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="div-clip">
      <rect width="1000" height="20"/>
    </clipPath>
  </defs>

  <!-- Base line (subtle static) -->
  <line x1="100" y1="10" x2="900" y2="10" stroke="url(#line-base)" stroke-width="0.5"/>

  <!-- Animated flowing gold highlight -->
  <g clip-path="url(#div-clip)">
    <rect class="gradient-bar" x="0" y="9" width="500" height="2" fill="url(#gold-flow)" rx="1"/>
  </g>

  <!-- Center diamond accent -->
  <g class="diamond-center" filter="url(#diamond-glow)">
    <rect x="496" y="6" width="8" height="8" rx="1" fill="#ffd700" transform="rotate(45 500 10)"/>
  </g>

  <!-- Floating particles -->
  <circle class="p1" cx="460" cy="10" r="1" fill="#ffd700" opacity="0.3"/>
  <circle class="p2" cx="480" cy="10" r="0.8" fill="#ffe666" opacity="0.25"/>
  <circle class="p3" cx="520" cy="10" r="1.2" fill="#ffd700" opacity="0.3"/>
  <circle class="p4" cx="540" cy="10" r="0.7" fill="#d4af37" opacity="0.2"/>
  <circle class="p5" cx="440" cy="10" r="0.9" fill="#ffe666" opacity="0.25"/>
  <circle class="p6" cx="560" cy="10" r="1" fill="#ffd700" opacity="0.28"/>
  <circle class="p7" cx="490" cy="10" r="0.6" fill="#d4af37" opacity="0.22"/>
  <circle class="p8" cx="510" cy="10" r="0.8" fill="#ffe666" opacity="0.26"/>
</svg>
