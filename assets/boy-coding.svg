<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 400" width="100%" height="400" fill="none">
  <defs>
    <!-- Gold Metallic Gradients -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe666"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b59410"/>
    </linearGradient>
    <linearGradient id="gold-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="radial-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <!-- Dark Metal Gradients -->
    <linearGradient id="dark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a30"/>
      <stop offset="100%" stop-color="#121215"/>
    </linearGradient>
    <linearGradient id="desk-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1e24"/>
      <stop offset="50%" stop-color="#25252d"/>
      <stop offset="100%" stop-color="#18181e"/>
    </linearGradient>

    <!-- Screen Clip Paths -->
    <clipPath id="screen-clip-left">
      <rect x="94" y="74" width="62" height="122" rx="3" />
    </clipPath>
    <clipPath id="screen-clip-right">
      <rect x="179" y="99" width="122" height="87" rx="3" />
    </clipPath>

    <!-- Soft Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    /* Typing Animations */
    @keyframes type-l {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      50% { transform: rotate(-3deg) translateY(-2px); }
    }
    @keyframes type-r {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      50% { transform: rotate(3deg) translateY(-3px); }
    }
    .arm-l {
      animation: type-l 0.16s ease-in-out infinite;
      transform-origin: 295px 180px;
    }
    .arm-r {
      animation: type-r 0.2s ease-in-out infinite;
      transform-origin: 290px 182px;
    }

    /* Screen Code Scroll Animations */
    @keyframes scroll-y-left {
      0% { transform: translateY(0); }
      100% { transform: translateY(-88px); }
    }
    @keyframes scroll-y-right {
      0% { transform: translateY(0); }
      100% { transform: translateY(-60px); }
    }
    .code-scroll-left {
      animation: scroll-y-left 5s linear infinite;
    }
    .code-scroll-right {
      animation: scroll-y-right 3.5s linear infinite;
    }

    /* Rotating Gears */
    @keyframes spin-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
    .gear-1 {
      animation: spin-cw 5s linear infinite;
      transform-origin: 263px 47px;
    }
    .gear-2 {
      animation: spin-ccw 5s linear infinite;
      transform-origin: 283px 53px;
    }

    /* Floating Speech Bubble & Code Symbols */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .bubble-group {
      animation: float 4s ease-in-out infinite;
    }
    .floating-code {
      animation: float 3s ease-in-out infinite;
    }
    .floating-code.d1 { animation-delay: 1s; }
    .floating-code.d2 { animation-delay: 2s; }

    /* Rising Steam */
    @keyframes steam {
      0% { transform: translateY(0) scaleX(1); opacity: 0; }
      15% { opacity: 0.6; }
      50% { transform: translateY(-6px) scaleX(1.2); opacity: 0.3; }
      100% { transform: translateY(-12px) scaleX(0.8); opacity: 0; }
    }
    .steam-line {
      animation: steam 2s infinite ease-in-out;
      transform-origin: bottom center;
    }
    .steam-line.s2 { animation-delay: 1s; }
  </style>

  <!-- ================= BACKGROUND FLOATING WIDGETS ================= -->
  <g class="floating-code">
    <text x="50" y="50" fill="#ffd700" font-family="monospace" font-weight="bold" font-size="14" opacity="0.15">&lt;/&gt;</text>
  </g>
  <g class="floating-code d1">
    <text x="390" y="90" fill="#ffd700" font-family="monospace" font-weight="bold" font-size="14" opacity="0.15">{ }</text>
  </g>
  <g class="floating-code d2">
    <text x="180" y="40" fill="#ffd700" font-family="monospace" font-weight="bold" font-size="12" opacity="0.12">zsh</text>
  </g>

  <!-- ================= GROUND WORKSPACE SHADOW ================= -->
  <ellipse cx="250" cy="365" rx="190" ry="12" fill="url(#radial-glow)"/>
  <ellipse cx="250" cy="365" rx="170" ry="8" fill="#000" opacity="0.4"/>

  <!-- ================= THE OFFICE CHAIR (BACK) ================= -->
  <g id="chair-back" filter="url(#shadow)">
    <!-- Headrest -->
    <rect x="306" y="116" width="28" height="18" rx="6" fill="#18181a" stroke="url(#gold-grad)" stroke-width="1.2"/>
    <!-- Headrest Support -->
    <path d="M320,134 L320,145" stroke="url(#gold-grad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Main Backrest -->
    <rect x="300" y="145" width="40" height="92" rx="10" fill="url(#dark-grad)" stroke="url(#gold-grad)" stroke-width="1.5"/>
    <rect x="306" y="152" width="28" height="78" rx="6" fill="#0b0b0d" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- ================= THE DESK & DRAWERS ================= -->
  <!-- Left Side Drawer Cabinet -->
  <rect x="60" y="256" width="75" height="92" rx="4" fill="url(#dark-grad)" stroke="url(#gold-grad)" stroke-width="1.2" filter="url(#shadow)"/>
  <line x1="60" y1="286" x2="135" y2="286" stroke="url(#gold-grad)" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="316" x2="135" y2="316" stroke="url(#gold-grad)" stroke-width="1" opacity="0.4"/>
  <!-- Drawer Handles -->
  <rect x="92" y="268" width="12" height="4" rx="1.5" fill="url(#gold-grad)"/>
  <rect x="92" y="298" width="12" height="4" rx="1.5" fill="url(#gold-grad)"/>
  <rect x="92" y="328" width="12" height="4" rx="1.5" fill="url(#gold-grad)"/>
  
  <!-- Desk Right Leg -->
  <path d="M330,256 L326,348 L334,348 L338,256 Z" fill="url(#gold-grad)"/>
  <!-- Tabletop -->
  <rect x="40" y="246" width="320" height="10" rx="3.5" fill="url(#desk-grad)" stroke="url(#gold-grad)" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- ================= MONITORS ================= -->
  <!-- Left Vertical Monitor -->
  <g id="left-monitor" filter="url(#shadow)">
    <!-- Stand -->
    <path d="M120,246 L130,246 L128,195 L122,195 Z" fill="#18181a" stroke="url(#gold-grad)" stroke-width="1"/>
    <!-- Outer Bezel -->
    <rect x="90" y="70" width="70" height="130" rx="6" fill="#121214" stroke="url(#gold-grad)" stroke-width="1.5" />
    <!-- Screen -->
    <rect x="94" y="74" width="62" height="122" rx="3" fill="#070708" />
    
    <!-- Scrolling Code lines -->
    <g clip-path="url(#screen-clip-left)">
      <g class="code-scroll-left">
        <g id="vert-code-lines">
          <rect x="98" y="10" width="22" height="3" fill="url(#gold-grad)" rx="1"/>
          <rect x="98" y="18" width="38" height="3" fill="#ffffff" rx="1" opacity="0.9"/>
          <rect x="98" y="26" width="16" height="3" fill="#a1a1a6" rx="1" opacity="0.6"/>
          <rect x="98" y="34" width="45" height="3" fill="url(#gold-grad)" rx="1"/>
          <rect x="98" y="42" width="28" height="3" fill="#ffffff" rx="1"/>
          <rect x="98" y="50" width="12" height="3" fill="#a1a1a6" rx="1" opacity="0.6"/>
          <rect x="98" y="58" width="32" height="3" fill="url(#gold-grad)" rx="1"/>
          <rect x="98" y="66" width="48" height="3" fill="#ffffff" rx="1"/>
          <rect x="98" y="74" width="20" height="3" fill="#a1a1a6" rx="1" opacity="0.6"/>
          <rect x="98" y="82" width="36" height="3" fill="url(#gold-grad)" rx="1"/>
        </g>
        <use xlink:href="#vert-code-lines" x="0" y="88"/>
      </g>
    </g>
  </g>

  <!-- Right Horizontal Monitor -->
  <g id="right-monitor" filter="url(#shadow)">
    <!-- Stand -->
    <path d="M230,246 L240,246 L238,188 L232,188 Z" fill="#18181a" stroke="url(#gold-grad)" stroke-width="1"/>
    <!-- Outer Bezel -->
    <rect x="175" y="95" width="130" height="95" rx="6" fill="#121214" stroke="url(#gold-grad)" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="179" y="99" width="122" height="87" rx="3" fill="#070708"/>
    <!-- Screen Accent Glow -->
    <rect x="179" y="99" width="122" height="87" rx="3" fill="url(#gold-glow)" opacity="0.15"/>
    
    <!-- Scrolling Code lines -->
    <g clip-path="url(#screen-clip-right)">
      <!-- Subtle Screen Grid -->
      <path d="M179,120 H301 M179,140 H301 M179,160 H301 M210,99 V186 M250,99 V186 M290,99 V186" stroke="#ffd700" stroke-width="0.3" opacity="0.08" />
      <g class="code-scroll-right">
        <g id="horiz-code-lines">
          <rect x="185" y="10" width="35" height="3.5" fill="url(#gold-grad)" rx="1"/>
          <rect x="185" y="18" width="55" height="3.5" fill="#ffffff" rx="1"/>
          <rect x="185" y="26" width="22" height="3.5" fill="#a1a1a6" rx="1" opacity="0.6"/>
          <rect x="185" y="34" width="70" height="3.5" fill="url(#gold-grad)" rx="1"/>
          <rect x="185" y="42" width="40" height="3.5" fill="#ffffff" rx="1"/>
          <rect x="185" y="50" width="30" height="3.5" fill="#a1a1a6" rx="1" opacity="0.6"/>
        </g>
        <use xlink:href="#horiz-code-lines" x="0" y="60"/>
      </g>
    </g>
  </g>

  <!-- Keyboard and Mouse on Desk -->
  <rect x="220" y="240" width="54" height="4" rx="1" fill="#18181a" stroke="url(#gold-grad)" stroke-width="0.8"/>
  <rect x="224" y="240" width="46" height="1.5" fill="url(#gold-grad)" opacity="0.7"/>
  <ellipse cx="282" cy="242" rx="2" ry="3" fill="#18181a" stroke="url(#gold-grad)" stroke-width="0.8"/>

  <!-- Coffee Mug with Steam -->
  <g id="coffee-mug">
    <path d="M158,236 H168 V246 A5,5 0 0,1 163,251 H163 A5,5 0 0,1 158,246 Z" fill="url(#gold-grad)" stroke="#121214" stroke-width="1.2" />
    <path d="M168,238 Q171,241 168,244" fill="none" stroke="url(#gold-grad)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Steam Paths -->
    <path class="steam-line" d="M161,232 Q163,228 161,224 T161,216" fill="none" stroke="url(#gold-grad)" stroke-width="1" stroke-linecap="round" opacity="0"/>
    <path class="steam-line s2" d="M164,232 Q162,228 164,224 T164,216" fill="none" stroke="url(#gold-grad)" stroke-width="1" stroke-linecap="round" opacity="0"/>
  </g>

  <!-- ================= THE OFFICE CHAIR (SEAT & BASE) ================= -->
  <g id="chair-base" filter="url(#shadow)">
    <!-- Seat -->
    <rect x="274" y="234" width="66" height="11" rx="4" fill="url(#dark-grad)" stroke="url(#gold-grad)" stroke-width="1.5"/>
    <!-- Gas Lift Shaft -->
    <rect x="302" y="245" width="10" height="40" fill="#121214" stroke="url(#gold-grad)" stroke-width="1"/>
    <!-- Five-Star Swivel Base legs -->
    <path d="M276,285 L328,285 M302,285 L285,293 M302,285 L319,293" stroke="url(#gold-grad)" stroke-width="3" stroke-linecap="round" />
    <!-- Caster Wheels -->
    <circle cx="276" cy="290" r="3.5" fill="#121214" stroke="url(#gold-grad)" stroke-width="1"/>
    <circle cx="328" cy="290" r="3.5" fill="#121214" stroke="url(#gold-grad)" stroke-width="1"/>
    <circle cx="285" cy="297" r="3.5" fill="#121214" stroke="url(#gold-grad)" stroke-width="1"/>
    <circle cx="319" cy="297" r="3.5" fill="#121214" stroke="url(#gold-grad)" stroke-width="1"/>
  </g>

  <!-- ================= THE DEVELOPER (BOY) ================= -->
  <g id="programmer">
    <!-- Legs / Pants -->
    <path d="M294,235 L246,247 L251,296 L262,296 L258,255 L305,245 Z" fill="#18181d" stroke="url(#gold-grad)" stroke-width="0.8"/>
    <!-- Gold Shoes -->
    <path d="M251,296 L242,301 L244,306 L262,306 L262,296 Z" fill="url(#gold-grad)" stroke="#121214" stroke-width="1"/>

    <!-- White Shirt & Torso -->
    <path d="M280,175 L310,175 L310,235 L275,235 Z" fill="#ffffff" />
    <!-- Gold Geometric stripes on shirt -->
    <line x1="282" y1="188" x2="308" y2="188" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.35"/>
    <line x1="280" y1="204" x2="310" y2="204" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.35"/>
    <line x1="277" y1="220" x2="310" y2="220" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.35"/>

    <!-- Black Vest with Gold Border -->
    <path d="M280,175 C285,175 288,185 288,195 C288,215 277,225 275,235 H306 V175 Z" fill="#0f0f12" stroke="url(#gold-grad)" stroke-width="1.2" />
    <circle cx="295" cy="190" r="1.5" fill="url(#gold-grad)"/>
    <circle cx="295" cy="205" r="1.5" fill="url(#gold-grad)"/>
    <circle cx="295" cy="220" r="1.5" fill="url(#gold-grad)"/>

    <!-- Face / Head -->
    <circle cx="286" cy="140" r="14" fill="#fddcb4" stroke="#121214" stroke-width="0.8"/>
    <!-- Cool Black Hair -->
    <path d="M272,138 C270,126 285,118 299,126 C303,130 299,141 294,141 C290,139 285,144 278,144 Z" fill="#121214" />
    <!-- Gold Wire-frame Glasses -->
    <circle cx="275" cy="138" r="4.5" fill="none" stroke="url(#gold-grad)" stroke-width="1.2" />
    <line x1="279.5" y1="138" x2="284.5" y2="138" stroke="url(#gold-grad)" stroke-width="1" />
    <line x1="270.5" y1="138" x2="269" y2="138" stroke="url(#gold-grad)" stroke-width="1" />

    <!-- typing Arms (Animated) -->
    <!-- Left Arm -->
    <path class="arm-l" d="M300,180 Q265,195 240,233" fill="none" stroke="#121214" stroke-width="7.5" stroke-linecap="round" />
    <path class="arm-l" d="M300,180 Q265,195 240,233" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
    <circle class="arm-l" cx="240" cy="233" r="3.5" fill="url(#gold-grad)" />
    <circle class="arm-l" cx="238" cy="235" r="2.8" fill="#fddcb4" />

    <!-- Right Arm -->
    <path class="arm-r" d="M295,182 Q260,203 244,235" fill="none" stroke="#25252c" stroke-width="7" stroke-linecap="round" />
    <path class="arm-r" d="M295,182 Q260,203 244,235" fill="none" stroke="url(#gold-grad)" stroke-width="1.2" stroke-linecap="round" opacity="0.8" />
    <circle class="arm-r" cx="244" cy="235" r="3.5" fill="url(#gold-grad)" />
    <circle class="arm-r" cx="242" cy="237" r="2.8" fill="#fddcb4" />
  </g>

  <!-- ================= THE GOLD WIREFRAME TRASH CAN ================= -->
  <g id="trash-can" filter="url(#shadow)">
    <path d="M375,305 L395,305 L390,345 L380,345 Z" fill="#0f0f12" stroke="url(#gold-grad)" stroke-width="1.5" />
    <!-- Vertical Wireframe Grid -->
    <line x1="379" y1="305" x2="382" y2="345" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.6"/>
    <line x1="385" y1="305" x2="385" y2="345" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.6"/>
    <line x1="391" y1="305" x2="388" y2="345" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.6"/>
    <!-- Horizontal Rings -->
    <path d="M375,315 Q385,317 395,315" fill="none" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.6"/>
    <path d="M377,327 Q385,329 393,327" fill="none" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.6"/>
    <path d="M379,339 Q385,341 391,339" fill="none" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.6"/>
    <!-- Glowing crumpled papers inside -->
    <circle cx="383" cy="338" r="4.5" fill="url(#gold-grad)"/>
    <circle cx="388" cy="341" r="3.8" fill="#e2b107"/>
    <circle cx="385" cy="331" r="3.2" fill="#ffe666"/>
  </g>

  <!-- ================= FLOATING SPEECH BUBBLE WITH SPINNING GEARS ================= -->
  <g class="bubble-group" filter="url(#shadow)">
    <!-- Chat Bubble Body -->
    <path d="M250,20 H300 C310,20 315,25 315,35 V60 C315,70 310,75 300,75 H280 L265,90 L265,75 H250 C240,75 235,70 235,60 V35 C235,25 240,20 250,20 Z" fill="#0f0f12" stroke="url(#gold-grad)" stroke-width="1.8"/>
    <path d="M250,20 H300 C310,20 315,25 315,35 V60 C315,70 310,75 300,75 H280 L265,90 L265,75 H250 C240,75 235,70 235,60 V35 C235,25 240,20 250,20 Z" fill="url(#gold-glow)" opacity="0.2"/>

    <!-- Gear 1 (Rotating Clockwise) -->
    <g class="gear-1">
      <circle cx="263" cy="47" r="7.5" fill="none" stroke="url(#gold-grad)" stroke-width="3" />
      <rect x="261" y="36.5" width="4" height="21" fill="url(#gold-grad)" rx="1"/>
      <rect x="261" y="36.5" width="4" height="21" fill="url(#gold-grad)" rx="1" transform="rotate(45, 263, 47)"/>
      <rect x="261" y="36.5" width="4" height="21" fill="url(#gold-grad)" rx="1" transform="rotate(90, 263, 47)"/>
      <rect x="261" y="36.5" width="4" height="21" fill="url(#gold-grad)" rx="1" transform="rotate(135, 263, 47)"/>
      <circle cx="263" cy="47" r="3.5" fill="#0f0f12" />
    </g>

    <!-- Gear 2 (Rotating Counter-Clockwise) -->
    <g class="gear-2">
      <circle cx="283" cy="53" r="5.5" fill="none" stroke="url(#gold-grad)" stroke-width="2.2" />
      <rect x="281.5" y="45" width="3" height="16" fill="url(#gold-grad)" rx="0.8"/>
      <rect x="281.5" y="45" width="3" height="16" fill="url(#gold-grad)" rx="0.8" transform="rotate(45, 283, 53)"/>
      <rect x="281.5" y="45" width="3" height="16" fill="url(#gold-grad)" rx="0.8" transform="rotate(90, 283, 53)"/>
      <rect x="281.5" y="45" width="3" height="16" fill="url(#gold-grad)" rx="0.8" transform="rotate(135, 283, 53)"/>
      <circle cx="283" cy="53" r="2.5" fill="#0f0f12" />
    </g>
  </g>
</svg>
