<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="300" fill="none">
  <style>
    @keyframes type {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes code-float {
      0% { transform: translate(0, 0) scale(0.7); opacity: 0; }
      50% { opacity: 1; filter: drop-shadow(0 0 4px currentColor); }
      100% { transform: translate(-45px, -90px) scale(1.3); opacity: 0; }
    }
    @keyframes neon-pulse {
      0%, 100% { opacity: 0.35; filter: blur(12px) drop-shadow(0 0 2px #00f2fe); }
      50% { opacity: 0.6; filter: blur(18px) drop-shadow(0 0 8px #ff007f); }
    }
    .head { fill: #8b949e; }
    .body { fill: #c9d1d9; }
    .computer { stroke: #388bfd; stroke-width: 3; fill: #161b22; }
    .neon-glow { fill: #00f2fe; }
    .arm-l { animation: type 0.18s ease-in-out infinite; transform-origin: 150px 180px; }
    .arm-r { animation: type 0.22s ease-in-out infinite; transform-origin: 170px 180px; }
    .floating-code {
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      font-weight: bold;
      animation: code-float 3s infinite linear;
    }
    .code-cyan { fill: #00f2fe; color: #00f2fe; animation-delay: 0s; }
    .code-pink { fill: #ff007f; color: #ff007f; animation-delay: 1s; }
    .code-yellow { fill: #ffee32; color: #ffee32; animation-delay: 2s; }
  </style>
  
  <!-- Neon Screen Glow -->
  <circle cx="120" cy="140" r="50" class="neon-glow" style="animation: neon-pulse 4s ease-in-out infinite;"/>

  <!-- Desk & Chair with Neon Trim -->
  <path d="M50 250 H250 M190 250 V200 H220 V250" stroke="#388bfd" stroke-width="4"/>
  <path d="M210 200 V150 H180 V200" stroke="#ff007f" stroke-width="3"/>

  <!-- Computer -->
  <rect x="70" y="100" width="80" height="60" rx="6" class="computer"/>
  <line x1="110" y1="160" x2="110" y2="185" stroke="#388bfd" stroke-width="6"/>
  <line x1="90" y1="185" x2="130" y2="185" stroke="#388bfd" stroke-width="6"/>
  <rect x="75" y="105" width="70" height="50" rx="3" fill="#0d1117" stroke="#00f2fe" stroke-width="1.5"/>
  
  <!-- Bright Screen Code Lines -->
  <rect x="80" y="112" width="25" height="3" fill="#00f2fe" rx="1"/>
  <rect x="80" y="118" width="45" height="3" fill="#ff007f" rx="1"/>
  <rect x="80" y="124" width="35" height="3" fill="#ffee32" rx="1"/>
  <rect x="80" y="130" width="20" height="3" fill="#00f2fe" rx="1"/>
  
  <circle cx="125" cy="140" r="2" fill="#ff007f"/>

  <!-- Keyboard -->
  <rect x="80" y="195" width="50" height="6" rx="2" fill="#161b22" stroke="#ff007f" stroke-width="1.5"/>

  <!-- Character details -->
  <circle cx="180" cy="110" r="18" class="head"/>
  <rect x="178" y="102" width="10" height="4" fill="#ff007f" rx="1"/>
  <circle cx="178" cy="110" r="5" fill="#388bfd"/>
  <circle cx="185" cy="107" r="2" fill="#0d1117"/>

  <!-- Body & Torso -->
  <path d="M165 130 C165 130 150 170 150 200 H210 V140 Z" class="body"/>

  <!-- Arms -->
  <path d="M160 145 Q135 175 125 190" stroke="#c9d1d9" stroke-width="8" stroke-linecap="round" class="arm-l"/>
  <path d="M165 145 Q145 170 128 190" stroke="#a1a8b0" stroke-width="7" stroke-linecap="round" class="arm-r"/>

  <!-- Floating Neon Code Symbols -->
  <g transform="translate(100, 100)">
    <text x="0" y="0" class="floating-code code-cyan">&lt;/&gt;</text>
    <text x="25" y="-10" class="floating-code code-pink">{ }</text>
    <text x="-15" y="-20" class="floating-code code-yellow">zsh</text>
  </g>
</svg>
