<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="150" fill="none">
  <style>
    @keyframes run {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes scroll-ground {
      0% { transform: translateX(0); }
      100% { transform: translateX(-30px); }
    }
    @keyframes obstacle {
      0% { transform: translateX(180px); }
      100% { transform: translateX(-120px); }
    }
    .term-bg { fill: #0d1117; stroke: url(#border-grad); stroke-width: 2; rx: 6; }
    .char { fill: #bd93f9; animation: run 0.35s steps(2) infinite; filter: drop-shadow(0 0 2px #bd93f9); }
    .obstacle { fill: #ff007f; animation: obstacle 1.8s linear infinite; filter: drop-shadow(0 0 3px #ff007f); }
    .ground { stroke: #00f2fe; stroke-width: 2; stroke-dasharray: 10 10; animation: scroll-ground 0.4s linear infinite; }
  </style>
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>
  </defs>
  
  <rect width="298" height="148" x="1" y="1" class="term-bg"/>
  <circle cx="15" cy="15" r="4" fill="#ff5f56"/>
  <circle cx="27" cy="15" r="4" fill="#ffbd2e"/>
  <circle cx="39" cy="15" r="4" fill="#27c93f"/>
  
  <!-- Ground -->
  <line x1="10" y1="120" x2="290" y2="120" stroke="#30363d" stroke-width="4"/>
  <line x1="10" y1="125" x2="290" y2="125" class="ground"/>

  <!-- Player Thief -->
  <g class="char">
    <rect x="50" y="85" width="15" height="30" rx="3"/>
    <circle cx="58" cy="77" r="7"/>
    <rect x="50" y="74" width="12" height="3" fill="#000"/>
  </g>

  <!-- Obstacle (Spikes) -->
  <g class="obstacle">
    <path d="M 100 120 L 110 95 L 120 120 Z"/>
  </g>

  <!-- Glowing Coin -->
  <g transform="translate(160, 60)" filter="drop-shadow(0 0 3px #ffee32)">
    <circle cx="0" cy="0" r="6" fill="#ffee32" stroke="#ffee32"/>
    <text x="-3" y="4" font-family="monospace" font-size="10" fill="#000" font-weight="bold">$</text>
  </g>
</svg>
