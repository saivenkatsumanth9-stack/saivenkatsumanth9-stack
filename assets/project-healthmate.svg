<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="150" fill="none">
  <style>
    @keyframes pulse {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes scale-heart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }
    .term-bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; rx: 6; }
    .ecg-line {
      stroke: #39ff14;
      stroke-width: 3;
      stroke-dasharray: 600;
      animation: pulse 3s linear infinite;
    }
    .heart-group {
      animation: scale-heart 0.8s ease-in-out infinite;
      transform-origin: 12px 12px;
    }
  </style>
  <rect width="298" height="148" x="1" y="1" class="term-bg"/>
  <circle cx="15" cy="15" r="4" fill="#ff5f56"/>
  <circle cx="27" cy="15" r="4" fill="#ffbd2e"/>
  <circle cx="39" cy="15" r="4" fill="#27c93f"/>
  
  <path d="M 10 75 L 50 75 L 60 50 L 70 100 L 80 30 L 90 120 L 100 75 L 140 75 L 150 50 L 160 100 L 170 30 L 180 120 L 190 75 L 220 75" class="ecg-line"/>
  
  <!-- Heart Icon -->
  <g class="heart-group" transform="translate(235, 62) scale(1.5)">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff5f56"/>
  </g>
</svg>
