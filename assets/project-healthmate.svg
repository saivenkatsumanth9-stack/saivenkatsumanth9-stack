<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="150" fill="none">
  <style>
    @keyframes pulse {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes scale-heart {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px #ff007f); }
      50% { transform: scale(1.18); filter: drop-shadow(0 0 6px #ff007f); }
    }
    .term-bg { fill: #0d1117; stroke: url(#border-grad); stroke-width: 2; rx: 6; }
    .ecg-line {
      stroke: url(#pulse-grad);
      stroke-width: 3;
      stroke-dasharray: 600;
      animation: pulse 3s linear infinite;
    }
    .heart-group {
      animation: scale-heart 0.8s ease-in-out infinite;
      transform-origin: 12px 12px;
    }

    /* === ROTATING BORDER CHASE === */
    @keyframes border-chase {
      0% { stroke-dashoffset: 900; }
      100% { stroke-dashoffset: 0; }
    }
    .chase-border {
      stroke-dasharray: 40 860;
      animation: border-chase 4s linear infinite;
    }

    /* === DIAGONAL SHIMMER SWEEP === */
    @keyframes shimmer-diag {
      0% { transform: translateX(-200px); }
      100% { transform: translateX(500px); }
    }
    .shimmer-sweep {
      animation: shimmer-diag 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 5s infinite;
    }

    /* === ECG TRAILING GLOW === */
    @keyframes ecg-glow-trail {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(0,242,254,0.4)) drop-shadow(0 0 4px rgba(189,147,249,0.3)); }
      50% { filter: drop-shadow(0 0 6px rgba(0,242,254,0.7)) drop-shadow(0 0 12px rgba(189,147,249,0.5)) drop-shadow(0 0 18px rgba(255,0,127,0.3)); }
    }
    .ecg-glow {
      animation: ecg-glow-trail 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* === HEART AMBIENT GLOW (synced with heart) === */
    @keyframes heart-ambient {
      0%, 100% { opacity: 0.1; r: 18; }
      50% { opacity: 0.35; r: 25; }
    }
    .heart-glow {
      animation: heart-ambient 0.8s ease-in-out infinite;
    }

    /* === BREATHING WINDOW CONTROLS === */
    @keyframes breathe-ctrl {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    .ctrl-red { animation: breathe-ctrl 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; transform-origin: 15px 15px; }
    .ctrl-yellow { animation: breathe-ctrl 3s cubic-bezier(0.4, 0, 0.6, 1) 0.4s infinite; transform-origin: 27px 15px; }
    .ctrl-green { animation: breathe-ctrl 3s cubic-bezier(0.4, 0, 0.6, 1) 0.8s infinite; transform-origin: 39px 15px; }

    @media (prefers-reduced-motion: reduce) {
      .ecg-line { animation: none; stroke-dashoffset: 0; stroke-dasharray: none; }
      .heart-group { animation: none; transform: scale(1); filter: drop-shadow(0 0 2px #ff007f); }
      .chase-border { animation: none; stroke-dasharray: none; }
      .shimmer-sweep { animation: none; opacity: 0; }
      .ecg-glow { animation: none; filter: none; }
      .heart-glow { animation: none; opacity: 0.15; }
      .ctrl-red, .ctrl-yellow, .ctrl-green { animation: none; opacity: 1; transform: none; }
    }
  </style>
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>
    <linearGradient id="chase-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe666"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#ffe666"/>
    </linearGradient>
    <linearGradient id="shimmer-diag-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,230,102,0)"/>
      <stop offset="45%" stop-color="rgba(255,230,102,0)"/>
      <stop offset="50%" stop-color="rgba(255,230,102,0.35)"/>
      <stop offset="55%" stop-color="rgba(255,230,102,0)"/>
      <stop offset="100%" stop-color="rgba(255,230,102,0)"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect width="298" height="148" x="1" y="1" rx="6"/>
    </clipPath>
  </defs>
  
  <rect width="298" height="148" x="1" y="1" class="term-bg"/>

  <!-- Rotating border chase -->
  <rect width="298" height="148" x="1" y="1" rx="6" fill="none" stroke="url(#chase-gold)" stroke-width="1.5" class="chase-border" opacity="0.85"/>

  <!-- Shimmer sweep -->
  <g clip-path="url(#card-clip)">
    <rect class="shimmer-sweep" x="-150" y="0" width="200" height="150" fill="url(#shimmer-diag-grad)"/>
  </g>

  <circle cx="15" cy="15" r="4" fill="#ff5f56" class="ctrl-red"/>
  <circle cx="27" cy="15" r="4" fill="#ffbd2e" class="ctrl-yellow"/>
  <circle cx="39" cy="15" r="4" fill="#27c93f" class="ctrl-green"/>
  
  <!-- ECG line with trailing glow -->
  <g class="ecg-glow">
    <path d="M 10 75 L 50 75 L 60 50 L 70 100 L 80 30 L 90 120 L 100 75 L 140 75 L 150 50 L 160 100 L 170 30 L 180 120 L 190 75 L 220 75" class="ecg-line" fill="none"/>
  </g>
  
  <!-- Heart Icon -->
  <g class="heart-group" transform="translate(235, 62) scale(1.5)">
    <!-- Ambient glow behind heart (synced with heartbeat) -->
    <circle cx="12" cy="12" r="18" fill="#ff007f" class="heart-glow" opacity="0.1"/>
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff007f"/>
  </g>
</svg>
